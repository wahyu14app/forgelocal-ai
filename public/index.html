<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForgeLocal.AI - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #121214; color: #e1e1e6; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="bg-[#1a1a1e] p-4 rounded-xl border border-zinc-800 space-y-4">
            <h2 class="text-xl font-bold border-b border-zinc-800 pb-2 text-indigo-400">Settings</h2>
            <div>
                <label class="block text-sm mb-1 text-zinc-400">Path File GGUF AI</label>
                <input id="modelPath" type="text" class="w-full bg-zinc-900 border border-zinc-700 p-2 rounded text-sm" placeholder="C:/Models/mistral-7b.gguf">
            </div>
            <div>
                <label class="block text-sm mb-1 text-zinc-400">Folder Workspace</label>
                <input id="workspacePath" type="text" class="w-full bg-zinc-900 border border-zinc-700 p-2 rounded text-sm" placeholder="./workspace_default">
            </div>
            <div>
                <label class="block text-sm mb-1 text-zinc-400">Context Size</label>
                <input id="contextSize" type="number" value="2048" class="w-full bg-zinc-900 border border-zinc-700 p-2 rounded text-sm">
            </div>
            <button onclick="saveConfig()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white p-2 rounded text-sm font-semibold transition">Simpan & Muat AI</button>
            <div id="statusAI" class="text-xs text-yellow-500 mt-2">Status: AI Belum Dimuat</div>
        </div>

        <div class="md:col-span-2 space-y-6">
            <div class="bg-[#1a1a1e] p-5 rounded-xl border border-zinc-800 space-y-3">
                <h2 class="text-xl font-bold text-emerald-400">AI Prompt Agent</h2>
                <textarea id="aiPrompt" rows="3" class="w-full bg-zinc-900 border border-zinc-700 p-3 rounded text-sm" placeholder="Contoh: Tolong buatkan fungsi hitung total belanja di file kasir.js"></textarea>
                <button onclick="sendPrompt()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded text-sm font-semibold transition">Kirim Perintah</button>
                <div class="bg-zinc-950 p-3 rounded border border-zinc-800 min-h-24 text-sm whitespace-pre-wrap" id="aiResponse">Output respons AI akan muncul di sini...</div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-[#1a1a1e] p-4 rounded-xl border border-zinc-800 space-y-2">
                    <h3 class="text-md font-bold text-zinc-300">File Editor</h3>
                    <input id="fileName" type="text" placeholder="namafile.js" class="w-full bg-zinc-900 border border-zinc-700 p-2 rounded text-xs">
                    <textarea id="fileContent" rows="6" placeholder="Isi file..." class="w-full bg-zinc-900 border border-zinc-700 p-2 rounded text-xs font-mono"></textarea>
                    <div class="flex gap-2">
                        <button onclick="fileOp('read')" class="bg-zinc-700 hover:bg-zinc-600 px-3 py-1.5 rounded text-xs">Baca</button>
                        <button onclick="fileOp('write')" class="bg-blue-600 hover:bg-blue-700 px-3 py-1.5 rounded text-xs">Simpan File</button>
                    </div>
                </div>

                <div class="bg-[#1a1a1e] p-4 rounded-xl border border-zinc-800 space-y-2">
                    <h3 class="text-md font-bold text-red-400">Terminal Emulator</h3>
                    <input id="termCmd" type="text" placeholder="npm run build / ls / dir" class="w-full bg-zinc-900 border border-zinc-700 p-2 rounded text-xs font-mono">
                    <button onclick="runCommand()" class="bg-zinc-700 hover:bg-zinc-600 px-3 py-1.5 rounded text-xs">Jalankan</button>
                    <pre id="termOutput" class="bg-black text-green-400 p-2 rounded text-[11px] h-32 overflow-y-auto font-mono">Output terminal...</pre>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function saveConfig() {
            const res = await fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    modelPath: document.getElementById('modelPath').value,
                    workspacePath: document.getElementById('workspacePath').value,
                    contextSize: document.getElementById('contextSize').value
                })
            });
            const data = await res.json();
            document.getElementById('statusAI').innerText = data.aiReady ? "Status: AI Siap (Offline)" : "Status: Gagal memuat AI. Periksa path file GGUF.";
            document.getElementById('statusAI').className = data.aiReady ? "text-xs text-green-400" : "text-xs text-red-400";
        }

        async function sendPrompt() {
            const out = document.getElementById('aiResponse');
            out.innerText = "AI sedang berpikir...";
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: document.getElementById('aiPrompt').value })
                });
                const data = await res.json();
                out.innerText = data.response || data.error;
            } catch (e) { out.innerText = "Error: " + e.message; }
        }

        async function fileOp(action) {
            const res = await fetch('/api/fs', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action,
                    filePath: document.getElementById('fileName').value,
                    content: document.getElementById('fileContent').value
                })
            });
            const data = await res.json();
            if(action === 'read') document.getElementById('fileContent').value = data.content;
            else alert(data.message || data.error);
        }

        async function runCommand() {
            const out = document.getElementById('termOutput');
            out.innerText = "Executing...";
            const res = await fetch('/api/terminal', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ command: document.getElementById('termCmd').value })
            });
            const data = await res.json();
            out.innerText = data.stdout || data.stderr || "Selesai tanpa output.";
        }

        // Ambil config awal saat page load
        fetch('/api/config').then(r => r.json()).then(d => {
            document.getElementById('modelPath').value = d.modelPath;
            document.getElementById('workspacePath').value = d.workspacePath;
        });
    </script>
</body>
</html>
